name: Tests

on:
  pull_request:
  push:
    branches:
      - master
      - develop
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm test -- --coverage --coverageReporters=lcov
      - uses: coverallsapp/github-action@v2
        with:
          file: coverage/lcov.info
